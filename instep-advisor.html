<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INSTEP-WFU Study Abroad Advisor</title>
  <style>
    :root {
      --instep-primary: #9E1B32;       /* Wake Forest "Old Gold and Black" deep red as accent */
      --instep-primary-dark: #7A1426;
      --instep-bg: #ffffff;
      --instep-panel: #f7f5f2;
      --instep-text: #1f2328;
      --instep-muted: #6b7280;
      --instep-bot-bubble: #f1ece4;
      --instep-user-bubble: #9E1B32;
      --instep-user-text: #ffffff;
      --instep-border: #e5e2dc;
      --instep-radius: 14px;
      --instep-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .instep-chat-root {
      font-family: var(--instep-font);
      color: var(--instep-text);
      background: var(--instep-bg);
      border: 1px solid var(--instep-border);
      border-radius: var(--instep-radius);
      max-width: 480px;
      width: 100%;
      height: 620px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
    }

    .instep-chat-root *,
    .instep-chat-root *::before,
    .instep-chat-root *::after { box-sizing: border-box; }

    .instep-header {
      background: var(--instep-primary);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .instep-header-title { font-size: 15px; font-weight: 600; line-height: 1.2; }
    .instep-header-sub { font-size: 12px; opacity: 0.9; margin-top: 2px; }
    .instep-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #fff; color: var(--instep-primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
    }

    .instep-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: var(--instep-panel);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .instep-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .instep-bubble a { color: inherit; text-decoration: underline; }
    .instep-bubble.bot {
      background: var(--instep-bot-bubble);
      color: var(--instep-text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .instep-bubble.user {
      background: var(--instep-user-bubble);
      color: var(--instep-user-text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .instep-bubble.bot a { color: var(--instep-primary-dark); }

    .instep-suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 8px;
      background: var(--instep-panel);
    }
    .instep-chip {
      font-size: 12px;
      padding: 6px 10px;
      background: #fff;
      border: 1px solid var(--instep-border);
      border-radius: 999px;
      cursor: pointer;
      color: var(--instep-text);
      transition: background 0.15s;
    }
    .instep-chip:hover { background: var(--instep-bot-bubble); }

    .instep-input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--instep-border);
      background: #fff;
    }
    .instep-input {
      flex: 1;
      border: 1px solid var(--instep-border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }
    .instep-input:focus { border-color: var(--instep-primary); }
    .instep-send {
      background: var(--instep-primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    .instep-send:hover:not(:disabled) { background: var(--instep-primary-dark); }
    .instep-send:disabled { opacity: 0.5; cursor: not-allowed; }

    .instep-typing {
      display: inline-flex;
      gap: 4px;
      align-self: flex-start;
      padding: 12px 14px;
      background: var(--instep-bot-bubble);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
    }
    .instep-typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--instep-muted);
      animation: instep-bounce 1.2s infinite ease-in-out;
    }
    .instep-typing span:nth-child(2) { animation-delay: 0.15s; }
    .instep-typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes instep-bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    .instep-footer {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--instep-muted);
      text-align: center;
      background: #fff;
      border-top: 1px solid var(--instep-border);
    }

    @media (max-width: 520px) {
      .instep-chat-root { height: 100vh; max-width: 100%; border-radius: 0; }
    }
  </style>
</head>
<body style="margin:0; padding:24px; background:#eee; display:flex; justify-content:center;">

  <!-- ====================== WIDGET MARKUP ====================== -->
  <div class="instep-chat-root" id="instep-chat-root">
    <div class="instep-header">
      <div class="instep-avatar">IW</div>
      <div>
        <div class="instep-header-title">INSTEP-WFU Study Abroad Advisor</div>
        <div class="instep-header-sub">London &amp; Cambridge program guidance</div>
      </div>
    </div>

    <div class="instep-messages" id="instep-messages" aria-live="polite"></div>

    <div class="instep-suggestions" id="instep-suggestions">
      <button class="instep-chip" data-q="What's the difference between the London and Cambridge programs?">London vs. Cambridge?</button>
      <button class="instep-chip" data-q="What is housing like in Cambridge?">Cambridge housing</button>
      <button class="instep-chip" data-q="Do I need a UK visa as a U.S. student?">UK visa</button>
      <button class="instep-chip" data-q="What's the application deadline for fall?">Fall deadline</button>
      <button class="instep-chip" data-q="Can students from outside Wake Forest apply?">Non-WFU students</button>
    </div>

    <form class="instep-input-row" id="instep-form" autocomplete="off">
      <textarea class="instep-input" id="instep-input" rows="1"
        placeholder="Ask about programs, housing, courses, visas..."
        aria-label="Type your question"></textarea>
      <button type="submit" class="instep-send" id="instep-send">Send</button>
    </form>

    <div class="instep-footer">
      Powered by INSTEP-WFU. For admissions or financial questions, contact your study abroad office.
    </div>
  </div>

  <!-- ====================== WIDGET LOGIC ====================== -->
  <script>
  (function () {
    // ====================================================================
    // CONFIG — edit this for your deployment
    // ====================================================================
    const CONFIG = {
      // URL of your backend proxy that holds the API key. See server-proxy.js.
      // For local testing, default to http://localhost:8787/api/chat
      apiEndpoint: (window.INSTEP_API_ENDPOINT || "http://localhost:8787/api/chat"),

      // Opening message shown when the widget loads
      welcomeMessage:
        "Hi — I'm the INSTEP-WFU Study Abroad Advisor. I can help you explore our semester programs in London and Cambridge, and answer questions about courses, housing, visas, and applying. What would you like to know?",

      // Max conversation turns kept in memory (user + assistant pairs)
      maxHistoryTurns: 12,
    };

    // ====================================================================
    // STATE
    // ====================================================================
    const messagesEl = document.getElementById("instep-messages");
    const formEl = document.getElementById("instep-form");
    const inputEl = document.getElementById("instep-input");
    const sendBtn = document.getElementById("instep-send");
    const suggestionsEl = document.getElementById("instep-suggestions");

    /** @type {{role: "user"|"assistant", content: string}[]} */
    const history = [];

    // ====================================================================
    // RENDERING
    // ====================================================================
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    // Minimal markdown: links [text](url), **bold**, line breaks
    function renderMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(
        /\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
        '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>'
      );
      return html;
    }

    function addBubble(role, text) {
      const div = document.createElement("div");
      div.className = "instep-bubble " + (role === "user" ? "user" : "bot");
      div.innerHTML = renderMarkdown(text);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addTypingIndicator() {
      const div = document.createElement("div");
      div.className = "instep-typing";
      div.innerHTML = "<span></span><span></span><span></span>";
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // ====================================================================
    // API CALL
    // ====================================================================
    async function sendToBackend(userMessage) {
      const payload = {
        message: userMessage,
        history: history.slice(-CONFIG.maxHistoryTurns * 2),
      };

      const res = await fetch(CONFIG.apiEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const errText = await res.text().catch(() => "");
        throw new Error(`Server error (${res.status}): ${errText.slice(0, 200)}`);
      }
      const data = await res.json();
      return data.reply || "Sorry — I didn't get a response. Please try again.";
    }

    // ====================================================================
    // EVENT HANDLERS
    // ====================================================================
    async function handleUserMessage(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      addBubble("user", trimmed);
      history.push({ role: "user", content: trimmed });
      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      // Hide suggestions once a real conversation starts
      if (suggestionsEl && history.length === 1) suggestionsEl.style.display = "none";

      const typingEl = addTypingIndicator();

      try {
        const reply = await sendToBackend(trimmed);
        typingEl.remove();
        addBubble("bot", reply);
        history.push({ role: "assistant", content: reply });
      } catch (err) {
        typingEl.remove();
        addBubble(
          "bot",
          "I'm having trouble reaching the advisor service right now. Please try again in a moment, or contact INSTEP directly at **steve@instep-programs.net** (non-WFU students) or **rybergcj@wfu.edu** (WFU students)."
        );
        console.error("[INSTEP advisor]", err);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    formEl.addEventListener("submit", e => {
      e.preventDefault();
      handleUserMessage(inputEl.value);
    });

    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        handleUserMessage(inputEl.value);
      }
    });

    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
    });

    suggestionsEl.addEventListener("click", e => {
      const btn = e.target.closest(".instep-chip");
      if (!btn) return;
      handleUserMessage(btn.getAttribute("data-q") || btn.textContent);
    });

    // Initial welcome
    addBubble("bot", CONFIG.welcomeMessage);
  })();
  </script>
</body>
</html>
